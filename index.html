<!DOCTYPE html>
<html>
<head>
  <title>My Own Phonetic Alphabet Translator</title>
  <style>
    #input-form {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    textarea,
    .output-box {
      width: 800px;
      max-width: 2000px;
      min-width: 300px;

      height: 150px;
      min-height: 150px;

      padding: 10px;
      font-size: 16px;
      text-align: left;
      font-family: Arial, sans-serif;
      line-height: 1.5;

      resize: both;
      overflow: auto;
      box-sizing: border-box;
    }

    .output-box {
      font-size: 20px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>My own phonetic alphabet translator</h1>

  <div id="input-form">
    <label for="input">Enter text here</label>
    <textarea id="input"></textarea>
  </div>

  <div>
    <label for="output">Translation</label>
    <textarea id="output" class="output-box" readonly></textarea>
  </div>

  <p>Spaces are translated as <code>/</code>.</p>

  <script>
    let input = document.getElementById("input");
    let output = document.getElementById("output");

    const PHONETIC_ALPHABET = {
      "A": "Autobot",
      "B": "Ben",
      "C": "Capsule",
      "D": "Daedra",
      "E": "Energon",
      "F": "Fasttrack",
      "G": "Goku",
      "H": "Heatblast",
      "I": "Imperial",

      "J": "Jyggalag",
      "K": "Khajiit",
      "L": "Lodestar",
      "M": "Mechamorph",
      "N": "Namek",
      "O": "Omnitrix",

      "P": "Primus",
      "Q": "Quintesson",
      "R": "Ratchet",

      "S": "Saiyan",
      "T": "Tetramand",
      "U": "Unicron",
      "V": "Vegeta",
      "W": "Wabbajack",
      "X": "XLR8",
      "Y": "Yokuda",
      "Z": "Zs'Skayr",

    };

    const KEEP_AS_IS = [
      ">:(", ">:)", ">:D", "D:<", ":)", ":(", ";)", ":D", "D:", ";D",
      ":P", "OoO", "O.O", "O_O", "^v^", "^o^", "^_^", "<3", "8D", "D8"
    ].sort((a, b) => b.length - a.length);

    input.addEventListener("input", updateOutput);

    function updateOutput() {
      output.value = translateToPhoneticAlphabet(input.value);
    }

    function translateToPhoneticAlphabet(text) {
      let result = "";
      let i = 0;

      while (i < text.length) {
        let matched = false;

        for (let emo of KEEP_AS_IS) {
          if (text.startsWith(emo, i)) {
            result += emo;
            i += emo.length;
            matched = true;
            break;
          }
        }

        if (matched) continue;

        let char = text[i];

        if (char === " ") {
          result += " / ";
          i++;
          continue;
        }

        if (char === "." || char === "?" || char === "!" || char === "-" || char === "$" || char === "_") {
          result += char;
          i++;
          continue;
        }

        let upperChar = char.toUpperCase();
        let code = PHONETIC_ALPHABET[upperChar];

        if (code) {
          result += code + " ";
        } else {
          result += char + " ";
        }

        i++;
      }

      return result.trim();
    }
  </script>
</body>
</html>
