<!DOCTYPE html>
<html>
<head>
  <title>Phonetic Alphabet Translator</title>
  <style>
    #input-form {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    textarea,
    .output-box {
      width: 800px;
      height: 150px;
      padding: 10px;
      font-size: 16px;
      text-align: left;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      resize: both;
      overflow: auto;
      box-sizing: border-box;
    }

    select {
      width: 800px;
      max-width: 2000px;
      min-width: 300px;
      height: 35px;
      padding: 5px;
      font-size: 16px;
      margin-bottom: 5px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h1>Phonetic Alphabet Translator</h1>

  <div>
    <label for="alphabet">Choose phonetic alphabet</label>
    <select id="alphabet">
      <option value="custom">My own Phonetic Alphabet</option>
      <option value="nato">NATO Phonetic Alphabet</option>
      <option value="pokemon">Pokémon Phonetic Alphabet</option>
      <option value="starwars">Star Wars Phonetic Alphabet</option>
      <option value="swspecies">Star Wars Species Phonetic Alphabet</option>
    </select>
  </div>

  <div id="input-form">
    <label for="input">Enter text here</label>
    <textarea id="input"></textarea>
  </div>

  <div>
    <label for="output">Translation</label>
    <textarea id="output" class="output-box" readonly></textarea>
  </div>

  <p>Spaces are translated as <code>/</code>.</p>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const alphabetSelect = document.getElementById("alphabet");

    const KEEP_AS_IS = [];

    const CUSTOM_ALPHABET = {
      "A": "Autobot",
      "B": "Ben",
      "C": "Capsule",
      "D": "Daedra",

      "J": "Jyggalag",
      "K": "Khajiit",
      "L": "Lodestar",
      "M": "Mechamorph",
      "N": "Namek",
      "O": "Omnitrix",
      "P": "Primus",
      "Q": "Quintesson",
      "R": "Ratchet",
      "S": "Saiyan",
      "T": "Tetramand",
      "U": "Unicron",
      "V": "Vegeta",
      "W": "Wabbajack",
      "X": "XLR8",
      "Y": "Yokuda",
      "Z": "Zs'Skayr"
    };

    const NATO_ALPHABET = {

      "M": "Mike",
      "N": "November",
      "O": "Oscar",
      "P": "Papa",
      "Q": "Quebec",
      "R": "Romeo",
      "S": "Sierra",
      "T": "Tango",
      "U": "Uniform",
      "V": "Victor",
      "W": "Whiskey",
      "X": "X-ray",
      "Y": "Yankee",

    };

    const POKEMON_ALPHABET = {
      "A": "Arbok",
      "B": "Blastoise",
      "C": "Charizard",
      "D": "Diglett",
      "E": "Eevee",
      "F": "Flareon",

    const STAR_WARS_ALPHABET = {
      "A": "Alderaan",
      "B": "Bespin",
      "C": "Coruscant",
      "D": "Dagobah",
      "E": "Ewok",
      "F": "Force",
      "G": "Gungan",
      "H": "Hoth",
      "I": "Imperial",
      "J": "Jedi",

    const STAR_WARS_SPECIES_ALPHABET = {
      "A": "Aing-Tii",

      "C": "Cerean",
      "D": "Duros",
      "E": "Ewok",
      "F": "Firrerreo",
      "G": "Gungan",
      "H": "Hutt",
      "I": "Ilwizzt",
      "J": "Jawa",
      "K": "Kiffar",
      "L": "Lasat",
      "M": "Mythrol",
      "N": "Nautolan",
      "O": "Ortolan",
      "P": "Pantoran",
      "Q": "Quermian",
      "R": "Rodian",
      "S": "Sullustan",
      "T": "Twi'lek",
      "U": "Umbaran",
      "V": "Vulptereen",
      "W": "Wookiee",
      "X": "Xexto",
      "Y": "Yuzzum",
      "Z": "Zabrak"
    };

    input.addEventListener("input", updateOutput);
    alphabetSelect.addEventListener("change", updateOutput);

    function getSelectedAlphabet() {
      if (alphabetSelect.value === "nato") return NATO_ALPHABET;
      if (alphabetSelect.value === "pokemon") return POKEMON_ALPHABET;
      if (alphabetSelect.value === "starwars") return STAR_WARS_ALPHABET;
      if (alphabetSelect.value === "swspecies") return STAR_WARS_SPECIES_ALPHABET;
      return CUSTOM_ALPHABET;
    }

    function updateOutput() {
      output.value = translateText(input.value);
    }

    function translateLine(line, alphabet) {
      let result = "";
      let i = 0;

      while (i < line.length) {
        let matched = false;

        for (let emo of KEEP_AS_IS) {
          if (line.startsWith(emo, i)) {
            result += emo;
            i += emo.length;
            matched = true;
            break;
          }
        }

        if (matched) continue;

        let char = line[i];

        if (char === " ") {
          result += "/ ";
          i++;
          continue;
        }

        let upperChar = char.toUpperCase();
        let code = alphabet[upperChar];

        if (code) {
          result += code + " ";
        } else {
          result += char + " ";
        }

        i++;
      }

      return result.trimEnd();
    }

    function translateText(text) {
      const alphabet = getSelectedAlphabet();

      return text
        .split(/\r?\n/)
        .map(line => translateLine(line, alphabet))
        .join("\n");
    }

    updateOutput();
  </script>
</body>
</html>
