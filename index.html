<!DOCTYPE html>
<html>
<head>
  <title>Phonetic Alphabet Translator</title>
  <style>
    #input-form {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    textarea,
    .output-box,
    select {
      width: 800px;
      max-width: 2000px;
      min-width: 300px;

      height: 150px;
      min-height: 150px;

      padding: 10px;
      font-size: 16px;
      text-align: left;
      font-family: Arial, sans-serif;
      line-height: 1.5;

      resize: both;
      overflow: auto;
      box-sizing: border-box;
    }

    .output-box {
      font-size: 15px;
    }

    select {
      height: auto;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <h1>Phonetic Alphabet Translator</h1>

  <div id="input-form">
    <label for="input">Enter text here</label>
    <textarea id="input"></textarea>
  </div>

  <div>
    <label for="alphabet">Choose alphabet</label>
    <select id="alphabet">
      <option value="custom">My Phonetic Alphabet</option>
      <option value="nato">NATO Phonetic Alphabet</option>
    </select>
  </div>

  <div>
    <label for="output">Translation</label>
    <textarea id="output" class="output-box" readonly></textarea>
  </div>

  <p>Spaces are translated as <code>/</code>.</p>

  <script>
    let input = document.getElementById("input");
    let output = document.getElementById("output");
    let alphabetSelect = document.getElementById("alphabet");

    const KEEP_AS_IS = [];

    const CUSTOM_ALPHABET = {
      "A": "Autobot",
      "B": "Ben",
      "C": "Capsule",
      "D": "Daedra",
      "E": "Energon",
      "F": "Fasttrack",
      "G": "Goku",
      "H": "Heatblast",
      "I": "Imperial",
      "J": "Jyggalag",
      "K": "Khajiit",
      "L": "Lodestar",
      "M": "Mechamorph",
      "N": "Namek",
      "O": "Omnitrix",
      "P": "Primus",
      "Q": "Quintesson",
      "R": "Ratchet",
      "S": "Saiyan",
      "T": "Tetramand",
      "U": "Unicron",
      "V": "Vegeta",
      "W": "Wabbajack",
      "X": "XLR8",
      "Y": "Yokuda",
      "Z": "Zs'Skayr"
    };

    const NATO_ALPHABET = {
      "A": "Alpha",
      "B": "Bravo",
      "C": "Charlie",
      "D": "Delta",
      "E": "Echo",
      "F": "Foxtrot",
      "G": "Golf",
      "H": "Hotel",
      "I": "India",
      "J": "Juliet",
      "K": "Kilo",
      "L": "Lima",
      "M": "Mike",
      "N": "November",
      "O": "Oscar",
      "P": "Papa",
      "Q": "Quebec",
      "R": "Romeo",
      "S": "Sierra",
      "T": "Tango",
      "U": "Uniform",
      "V": "Victor",
      "W": "Whiskey",
      "X": "X-ray",
      "Y": "Yankee",
      "Z": "Zulu"
    };

    input.addEventListener("input", updateOutput);
    alphabetSelect.addEventListener("change", updateOutput);

    function getSelectedAlphabet() {
      return alphabetSelect.value === "nato"
        ? NATO_ALPHABET
        : CUSTOM_ALPHABET;
    }

    function updateOutput() {
      output.value = translateText(input.value);
    }

    function translateLine(line, alphabet) {
      let result = "";
      let i = 0;

      while (i < line.length) {
        let matched = false;

        for (let emo of KEEP_AS_IS) {
          if (line.startsWith(emo, i)) {
            result += emo;
            i += emo.length;
            matched = true;
            break;
          }
        }

        if (matched) continue;

        let char = line[i];

        if (char === " ") {
          result += "/ ";
          i++;
          continue;
        }

        if (char === "." || char === "?" || char === "!" || char === "-" || char === "$" || char === "_") {
          result += char;
          i++;
          continue;
        }

        let upperChar = char.toUpperCase();
        let code = alphabet[upperChar];

        if (code) {
          result += code + " ";
        } else {
          result += char + " ";
        }

        i++;
      }

      return result.trimEnd();
    }

    function translateText(text) {
      const alphabet = getSelectedAlphabet();

      return text
        .split(/\r?\n/)
        .map(line => translateLine(line, alphabet))
        .join("\n");
    }
  </script>
</body>
</html>
